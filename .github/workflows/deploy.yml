name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: cd app && bun install --frozen-lockfile
      - name: Build app
        run: cd app && bun run build
      - name: Assemble site (app at root + experiments archive)
        run: |
          mkdir -p site
          cp -r app/dist/* site/
          mkdir -p site/experiments
          cp -r experiments/* site/experiments/
          mkdir -p site/iterations
          cp -r iterations/* site/iterations/
          mkdir -p site/versions
          cp -r versions/* site/versions/
          cp index.html site/archive.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000   # 30 min queue patience — rides out GitHub Pages "degraded performance" incidents
          error_count: 15
