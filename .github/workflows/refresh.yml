name: Refresh content

# Runs WEEKLY — automatically every THURSDAY 13:00 UTC (15:00 CET) — and ON DEMAND (the "Run
# workflow" button in the Actions tab). THURSDAY, not Monday: the key sources (Your Little Black
# Book's weekend agenda, I amsterdam's weekend curation) publish mid-to-late week, so a Monday
# pull predated them and the weekend always felt stale. Thursday afternoon catches the fresh
# weekend guides while still leaving Fri–Sun to plan. Pulls fresh picks via the pipeline, ranks
# them by buzz, commits the updated picks.json, then kicks the Pages deploy. No prompting needed.
on:
  schedule:
    - cron: '0 13 * * 4'     # Thursday 13:00 UTC (15:00 CET) — after the weekend guides drop
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: cd app && bun install --frozen-lockfile
      - name: Logic tests   # date parsing / dedupe / ranking regression guard — a red suite means
        run: cd app && bun test tests   # no content run: last-good keeps serving + the failure emails Ness
      - name: Run pipeline
        env:
          # add these as repo secrets to turn the live pull on:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # the diverse/interesting LLM pull
          SONGKICK_API_KEY: ${{ secrets.SONGKICK_API_KEY }}     # optional clean gigs
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}         # vivid on-theme stock for events w/o a real photo
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}         # Google-Images candidate pool (better than the keyless DDG fallback)
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}       # optional healthchecks.io ping — pages on a regression / silent non-run
          WEBSEARCH_RPM: '3'                                    # deeper research — assumes the RAISED Anthropic tier
          ANTHROPIC_JUDGE_MODEL: 'claude-sonnet-4-6'            # the stronger "best of the weekend" editor (NOT the haiku extractor)
        run: cd app && bun run refresh
      - name: Commit if the feed changed
        id: commit
        run: |
          git config user.name "wkndr-bot"
          git config user.email "noreply@anthropic.com"
          git add app/public/data
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No feed changes."
          else
            git commit -m "chore(content): weekly refresh $(date -u +%Y-%m-%d)"
            # rebase onto any commits that landed on main while the (long) pipeline ran, so the
            # push can't be rejected non-fast-forward (the feed touches only app/public/data, so a
            # rebase applies cleanly). Retry up to 3×; if every attempt fails, the step MUST go red —
            # a fallen-through loop here once exited 0 with changed=true and made a broken deploy look green.
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              git rebase --abort >/dev/null 2>&1 || true   # clear any half-applied rebase so the retry starts clean
              echo "push attempt $i failed — retrying"; sleep 3
            done
            if [ "$pushed" != "true" ]; then
              echo "::error::push failed after 3 attempts — refresh NOT published"
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
      - name: Healthcheck OK ping
        # DEAD-MAN'S SWITCH — the healthchecks.io "ok" only fires here, as the LAST step, so it vouches for
        # the WHOLE loop: pipeline → commit/push → deploy trigger. (It used to fire inside refresh.ts, which
        # called the run healthy before the publish steps had happened.) Default `if: success()` also covers
        # the no-change week — deploy skipped still counts as a clean run. The /fail ping on a gate
        # regression stays in refresh.ts and fires the moment the gate abstains.
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 --retry 3 -X POST -d 'ok' "$HEALTHCHECK_URL" || echo "healthcheck ping failed (non-fatal)"
          fi
